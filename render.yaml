services:
  # Наш Go Backend
  - type: web
    name: foodsave-backend
    env: docker
    region: frankfurt
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foodsave-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://foodsave-frontend.onrender.com
      - key: PORT
        value: 8080

  # Наш Next.js Frontend
  - type: web
    name: foodsave-frontend
    env: docker
    region: frankfurt
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: foodsave-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: PORT
        value: 10000

databases:
  # База данных PostgreSQL
  - name: foodsave-db
    region: frankfurt
    plan: free
    databaseName: vapor_database
    user: vapor_username
